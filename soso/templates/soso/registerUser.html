<!DOCTYPE html>

<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>会員登録</title>
    </head>
    <body>
        <div class="content">
			<h3>会員情報を入力してください。</h3>
			<div class="form">
				{% if error %}
                <p style="color:red;">{{ error }}</p>
                {% endif %}
            <form action="{% url 'soso:user_create'%}" method='POST'>
				{% csrf_token %}
				<table>
					{{form.as_table}}
				</table>
				<input type="submit" value="登録確認" /><br>
                <a href="{% url 'soso:user_login'%}">商品検索</a>
			</form>
			</div>
        </div>
    </body>
</html>
