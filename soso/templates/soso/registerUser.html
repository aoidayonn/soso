<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>会員登録</title>
</head>
<body>
    <div class="content">
        <h3>会員情報を入力してください。</h3>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <div class="form">
            <form action="{% url 'soso:user_create' %}" method="POST">
                {% csrf_token %}
                <table>
                    {{ form.as_table }}
                </table>
                <input type="submit" value="確認" />
            </form>
        </div>

        <br>
        <a href="{% url 'soso:user_login' %}">ログイン画面に戻る</a>
    </div>
</body>
</html>
