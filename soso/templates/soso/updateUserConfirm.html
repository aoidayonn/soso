<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>会員情報変更確認</title>
</head>
<body>
    <div class="content">
        <h3>以下の内容に変更します。よろしいですか？</h3>

        <table border="1">
            <tr><th>会員ID</th><td>{{ form.cleaned_data.user_id }}</td></tr>
            <tr>
                <th>パスワード</th>
                <td>
                    <input type="password" value="{{ form.cleaned_data.password_1 }}" readonly>
                </td>
            </tr>
            <tr><th>お名前</th><td>{{ form.cleaned_data.name }}</td></tr>
            <tr><th>ご住所</th><td>{{ form.cleaned_data.address }}</td></tr>
        </table>

        <form action="{% url 'soso:user_update_confirm' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="password_1" value="{{ form.cleaned_data.password_1 }}">
            <input type="hidden" name="name" value="{{ form.cleaned_data.name }}">
            <input type="hidden" name="address" value="{{ form.cleaned_data.address }}">
            <button type="submit">変更</button>
        </form>

        <br>
        <a href="{% url 'soso:top_page' %}">商品検索に戻る</a>
    </div>
</body>
</html>
