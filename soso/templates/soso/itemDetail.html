<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>商品詳細</title>
</head>
<body>
    <div class="content">
        <h3>商品詳細</h3>

        <table border="1">
            <tr><th>商品名</th><td>{{ item_info.name }}</td></tr>
            <tr><th>色</th><td>{{ item_info.color }}</td></tr>
            <tr><th>メーカー</th><td>{{ item_info.manufacturer }}</td></tr>
            <tr><th>価格</th><td>{{ item_info.price }}円</td></tr>
            <tr><th>在庫数</th><td>{{ item_info.stock }}</td></tr>
        </table>

        <br>

        {% if item_info.stock > 0 %}
        <form action="{% url 'soso:shopping_cart' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="item_id" value="{{ item_info.item_id }}">
            数量:
            <select name="num">
                {% for n in numbers %}
                <option value="{{ n }}">{{ n }}</option>
                {% endfor %}
            </select>
            <br><button type="submit">ショッピングカートに入れる</button>
        </form>
        {% else %}
        <p style="color:red;">現在在庫切れです。</p>
        {% endif %}

        <br>
        <a href="{% url 'soso:top_page' %}">商品検索に戻る</a>
    </div>
</body>
</html>
